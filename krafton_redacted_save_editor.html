<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>[REDACTED] Save Editor 1.0 by Henry</title>
        <style>
        :root {
        --bg: #0c0c0c;
        --panel: #161514;
        --panel-2:#1d1c1a;
        --line: #332f1f;
        --text: #f3efe2;
        --muted: #b6a268;
        --accent: #fde212;
        --accent-ink: #1a1500;
        --accent-dim: #6b5a14;
        --cyan: #01d7fe;
        --cyan-dim: #0a4f5e;
        --warn: #fde212;
        --danger: #ff5a4d;
        --mono: ui-monospace, Consolas, monospace;
        --sans: system-ui, sans-serif;
        }
        * {
        box-sizing: border-box;
        }
        body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle, rgba(253, 226, 18, 0.07) 1px, transparent 1.4px) 0 0/14px 14px, radial-gradient(ellipse at 20% -10%, #241f0f 0%, transparent 50%), var(--bg);
        color: var(--text);
        font-family: var(--sans);
        padding: 32px 20px 80px;
        }
        .wrap {
        max-width: 640px;
        margin: 0 auto;
        }
        header {
        margin-bottom: 28px;
        }
        header .eyebrow {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: .14em;
        color: var(--cyan);
        text-transform: uppercase;
        margin-bottom: 8px;
        }
        h1 {
        font-size: 26px;
        margin: 0 0 6px;
        font-weight: 650;
        letter-spacing: -.01em;
        }
        header p {
        color: var(--muted);
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        max-width: 60ch;
        }
        .dropzone {
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 36px 20px;
        text-align: center;
        background: var(--panel);
        cursor: pointer;
        transition: border-color .15s, background .15s;
        margin-bottom: 24px;
        }
        .dropzone:hover,
        .dropzone.drag {
        border-color: var(--cyan-dim);
        background: var(--panel-2);
        }
        .dropzone .icon {
        font-family: var(--mono);
        font-size: 22px;
        color: var(--accent);
        margin-bottom: 10px;
        }
        .dropzone .main {
        font-size: 14px;
        color: var(--text);
        }
        .dropzone .sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
        }
        input[type=file] {
        display: none;
        }
        .filemeta {
        display: none;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        margin: -12px 0 24px;
        padding: 10px 14px;
        background: var(--panel-2);
        border-radius: 8px;
        border: 1px solid var(--line);
        }
        .filemeta b {
        color: var(--text);
        }
        .section {
        margin-bottom: 28px;
        }
        .field-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 10px;
        }
        .field-row {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        }
        .field-label {
        flex: 1 1 160px;
        font-size: 14px;
        font-weight: 600;
        }
        .occurrence-note {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--warn);
        margin-top: 6px;
        flex-basis: 100%;
        }
        .value-inputs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        }
        .value-inputs label {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        display: flex;
        flex-direction: column;
        gap: 4px;
        }
        input[type=number] {
        width: 100px;
        padding: 8px 10px;
        background: #0a0f0b;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 14px;
        }
        input[type=number]:focus {
        outline: none;
        border-color: var(--cyan);
        }
        .badge {
        font-family: var(--mono);
        font-size: 12px;
        padding: 2px 7px;
        border-radius: 20px;
        background: var(--cyan-dim);
        color: #bdf4ff;
        letter-spacing: .03em;
        }
        .actions {
        position: sticky;
        bottom: 0;
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 16px 0 4px;
        background: linear-gradient(to top, var(--bg) 60%, transparent);
        margin-top: 8px;
        }
        button {
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        padding: 11px 20px;
        border-radius: 8px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform .08s, filter .15s;
        }
        button:active {
        transform: scale(.98);
        }
        .btn-primary {
        background: var(--accent);
        color: var(--accent-ink);
        }
        .btn-primary:hover {
        filter: brightness(1.08);
        }
        .btn-primary:disabled {
        background: #33402f;
        color: #6b7a66;
        cursor: not-allowed;
        }
        .btn-ghost {
        background: transparent;
        color: var(--muted);
        border-color: var(--line);
        }
        .btn-ghost:hover {
        color: var(--text);
        border-color: var(--muted);
        }
        .status {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        }
        .status.ok {
        color: var(--cyan);
        }
        .status.err {
        color: var(--danger);
        }
        .empty-hint {
        color: var(--muted);
        font-size: 13px;
        text-align: center;
        padding: 30px 0;
        }
        .log {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        max-height: 160px;
        overflow-y: auto;
        margin-top: 14px;
        white-space: pre-wrap;
        display: none;
        }
        details.advanced {
        margin-top: 6px;
        }
        details.advanced summary {
        cursor: pointer;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        }
        details.advanced summary:hover {
        color: var(--text);
        }

.section-divider{position:relative;margin:28px 0 18px;text-align:center}
.section-divider:before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(to right,transparent,var(--line),transparent)}
.section-divider span{position:relative;padding:0 16px;background:var(--bg);color:var(--accent);font-family:var(--mono);letter-spacing:.15em;font-size:12px;text-transform:uppercase}
.field-card{background:linear-gradient(180deg,#1d1c1a,#171614);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;margin-bottom:14px;transition:.2s}
.field-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 20px rgba(0,0,0,.35)}
input[type=number]{width:120px;padding:10px 12px;background:#101010;border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:16px}
input[type=number]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(253,226,18,.15)}
h1{font-size:34px;color:var(--accent);text-shadow:0 0 12px rgba(253,226,18,.15)}

</style>
    </head>
    <body>
        <div class="wrap">
            <header>
                <div class="eyebrow">NOT AFFILIATED WITH KRAFTON</div>
                <h1>[REDACTED] Save Editor 1.0 by Henry</h1>
            </header>
            <div class="dropzone" id="dropzone">
                <div class="icon">⤓</div>
                <div class="main">Drop your <code>.sav</code> file here, or click to browse</div>
                <input type="file" id="fileInput" accept=".sav">
            </div>
            <div class="filemeta" id="filemeta"></div>
            <div id="content"></div>
            <div class="log" id="log"></div>
        </div>
        <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const filemeta = document.getElementById('filemeta');
        const content = document.getElementById('content');
        const logEl = document.getElementById('log');
        let rawBytes = null;
        let originalName = 'save.sav';
        let fields = [];
        let missingCurrencies = [];
        dropzone.addEventListener('click', () => fileInput.click());
        ['dragover', 'dragenter'].forEach(ev => dropzone.addEventListener(ev, e => {
        e.preventDefault();
        dropzone.classList.add('drag');
        }));
        ['dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, e => {
        e.preventDefault();
        dropzone.classList.remove('drag');
        }));
        dropzone.addEventListener('drop', e => {
        const f = e.dataTransfer.files[0];
        if (f) loadFile(f);
        });
        fileInput.addEventListener('change', e => {
        const f = e.target.files[0];
        if (f) loadFile(f);
        });
        function log(msg) {
        logEl.style.display = 'block';
        logEl.textContent += msg + "\n";
        logEl.scrollTop = logEl.scrollHeight;
        }
        function loadFile(file) {
        originalName = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
        rawBytes = new Uint8Array(e.target.result);
        filemeta.style.display = 'block';
        filemeta.innerHTML = `<b>${escapeHtml(file.name)}</b> &middot; ${rawBytes.length.toLocaleString()} bytes`;
        logEl.textContent = '';
        scanFile();
        };
        reader.onerror = () => alert('Could not read file.');
        reader.readAsArrayBuffer(file);
        }
        function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
        }[c]));
        }
        function readU32(buf, off) {
        return buf[off] | (buf[off + 1] << 8) | (buf[off + 2] << 16) | (buf[off + 3] << 24);
        }
        function writeU32(buf, off, val) {
        val = val >>> 0;
        buf[off] = val & 0xFF;
        buf[off + 1] = (val >>> 8) & 0xFF;
        buf[off + 2] = (val >>> 16) & 0xFF;
        buf[off + 3] = (val >>> 24) & 0xFF;
        }
        function readI32(buf, off) {
        return readU32(buf, off) | 0;
        }
        function readF32(buf, off) {
        const dv = new DataView(buf.buffer, buf.byteOffset + off, 4);
        return dv.getFloat32(0, true);
        }
        function writeF32(buf, off, val) {
        const dv = new DataView(buf.buffer, buf.byteOffset + off, 4);
        dv.setFloat32(0, val, true);
        }
        function bytesEqual(buf, off, pattern) {
        if (off + pattern.length > buf.length) return false;
        for (let i = 0; i < pattern.length; i++) {
        if (buf[off + i] !== pattern[i]) return false;
        }
        return true;
        }
        function strToBytes(s) {
        const b = new Uint8Array(s.length);
        for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
        return b;
        }
        function findAllOccurrences(buf, patternBytes) {
        const out = [];
        const first = patternBytes[0];
        const limit = buf.length - patternBytes.length;
        for (let i = 0; i <= limit; i++) {
        if (buf[i] !== first) continue;
        if (bytesEqual(buf, i, patternBytes)) out.push(i);
        }
        return out;
        }
        const CURRENCY_DEFS = [{
        key: 'Credits',
        label: 'Credits',
        icon: 'currency'
        }, {
        key: 'BEV_Contraband',
        label: 'Contraband',
        icon: 'currency'
        }, {
        key: 'BEV_Keycodes',
        label: 'Keycodes',
        icon: 'currency'
        }, {
        key: 'BEV_Electronics',
        label: 'Electronics',
        icon: 'currency'
        }, {
        key: 'BEV_SecurityID',
        label: 'Security IDs',
        icon: 'currency'
        }, {
        key: 'BEV_BossToken',
        label: 'Samples',
        icon: 'currency'
        }, {
        key: 'BEV_RivalToken',
        label: 'Souvenirs',
        icon: 'currency'
        }, {
        key: 'BEV_SkillSlot',
        label: 'Skill Slots',
        icon: 'currency'
        }, ];
        function scanHealth() {
        const tag = strToBytes('PPRG');
        const positions = findAllOccurrences(rawBytes, tag);
        if (positions.length === 0) return null;
        const pos = positions[0];
        const versionOff = pos + 4;
        const healthOff = pos + 12;
        if (healthOff + 4 > rawBytes.length) return null;
        const version = readU32(rawBytes, versionOff);
        if (version !== 10) return null;
        const value = readF32(rawBytes, healthOff);
        if (!Number.isFinite(value) || value < 0 || value > 100000) return null;
        return {
        offset: healthOff,
        value
        };
        }
        function scanFile() {
        fields = [];
        missingCurrencies = [];
        log(`Scanning ${rawBytes.length.toLocaleString()} bytes...`);
        const health = scanHealth();
        if (health) {
        fields.push({
        type: 'health',
        label: 'Current Health',
        occurrences: [health],
        });
        log(` Current Health: ${health.value}`);
        } else {
        log(` Current Health: not found`);
        }
        CURRENCY_DEFS.forEach(def => {
        const pattern = strToBytes(def.key + '\0');
        const positions = findAllOccurrences(rawBytes, pattern);
        const occurrences = [];
        positions.forEach(pos => {
        const qtyOff = pos + pattern.length;
        if (qtyOff + 8 > rawBytes.length) return;
        const qty = readU32(rawBytes, qtyOff);
        const max = readI32(rawBytes, qtyOff + 4);
        if (max === 2147483647) {
        occurrences.push({
        offset: qtyOff,
        value: qty
        });
        }
        });
        if (occurrences.length > 0) {
        fields.push({
        type: 'currency',
        label: def.label,
        key: def.key,
        occurrences,
        });
        log(` ${def.label}: ${occurrences.length} field(s) -> [${occurrences.map(o=>o.value).join(', ')}]`);
        } else {
        missingCurrencies.push(def.label);
        log(` ${def.label}: not found`);
        }
        });
        log(`Done. ${fields.length} editable field(s) found.`);
        renderFields();
        }
        function renderFields() {
        if (fields.length === 0 && missingCurrencies.length === 0) {
        content.innerHTML = `<div class="empty-hint">No recognized editable fields found in this file..</div>`;
        return;
        }
        const healthField = fields.find(f => f.type === 'health');
        const currencyFields = fields.filter(f => f.type === 'currency');
        let html = '';
        if (healthField) {
        html += `<div class="section">`;
            html += renderFieldCard(healthField, 'health', 0);
        html += `</div>`;
        }
        if (currencyFields.length) {
        html += `<div class="section">`;
            currencyFields.forEach((f, idx) => {
            if (f.label === 'Credits') {
                html += `<div class="section-divider"><span>META CURRENCIES</span></div>`;
            }
            if (f.label === 'Skill Slots') {
                html += `<div class="section-divider"><span>EQUIPPED SKILLS</span></div>`;
            }
            html += renderFieldCard(f, 'currency', idx);
        });
            if (missingCurrencies.length) {
            html += `<div class="occurrence-note" style="margin-top:4px;">
                ${missingCurrencies.map(escapeHtml).join(', ')} ${missingCurrencies.length === 1 ? 'has' : 'have'} a quantity of 0 in this save. Collect at least one in-game, then re-load the save.
            </div>`;
            }
        html += `</div>`;
        }
        content.innerHTML = html;
        fields.forEach((f, fi) => {
        const input = document.getElementById(`val-${fi}`);
        if (input) {
        input.addEventListener('input', () => {
        const v = f.type === 'health' ? parseFloat(input.value) : parseInt(input.value, 10);
        const newVal = Number.isFinite(v) && v >= 0 ? v : f.occurrences[0].value;
        f.occurrences.forEach(occ => {
        occ.pendingValue = newVal;
        });
        });
        }
        });
        renderActions();
        }
        function renderFieldCard(f, kind, fi) {
        const globalIndex = fields.indexOf(f);
        const displayValue = f.occurrences[0].value;
        const step = f.type === 'health' ? 'any' : '1';
        return `
        <div class="field-card">
            <div class="field-row">
                <div class="field-label">
                    ${escapeHtml(f.label)}
                </div>
                <div class="value-inputs">
                    <label>
                        amount
                        <input type="number" min="0" step="${step}" id="val-${globalIndex}" value="${displayValue}">
                    </label>
                </div>
            </div>
        </div>
        `;
        }
        function renderActions() {
        let actionsDiv = document.getElementById('actionsBar');
        if (!actionsDiv) {
        actionsDiv = document.createElement('div');
        actionsDiv.id = 'actionsBar';
        actionsDiv.className = 'actions';
        content.appendChild(actionsDiv);
        }
        actionsDiv.innerHTML = `
        <button class="btn-primary" id="saveBtn">Apply changes &amp; download</button>
        <button class="btn-ghost" id="resetBtn">Reset values</button>
        <span class="status" id="statusMsg"></span>
        `;
        document.getElementById('saveBtn').addEventListener('click', applyAndDownload);
        document.getElementById('resetBtn').addEventListener('click', () => {
        fields.forEach(f => f.occurrences.forEach(o => o.pendingValue = undefined));
        renderFields();
        });
        }
        function applyAndDownload() {
        const statusMsg = document.getElementById('statusMsg');
        try {
        const out = new Uint8Array(rawBytes);
        let changeCount = 0;
        fields.forEach(f => {
        f.occurrences.forEach(occ => {
        const newVal = occ.pendingValue;
        if (newVal !== undefined && newVal !== occ.value) {
        if (f.type === 'health') {
        writeF32(out, occ.offset, newVal);
        } else {
        writeU32(out, occ.offset, newVal);
        }
        changeCount++;
        }
        });
        });
        if (changeCount === 0) {
        statusMsg.textContent = 'No changes to save.';
        statusMsg.className = 'status';
        return;
        }
        const blob = new Blob([out], {
        type: 'application/octet-stream'
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = originalName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        statusMsg.textContent = `Saved ${changeCount} field change(s) to ${originalName}.`;
        statusMsg.className = 'status ok';
        log(`Applied ${changeCount} change(s) and triggered download.`);
        } catch (err) {
        statusMsg.textContent = 'Error: ' + err.message;
        statusMsg.className = 'status err';
        log('ERROR: ' + err.message);
        }
        }
        </script>
    </body>
</html>
